<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>G-ForcePlays Admin Login</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>


<body>

    <main id="loginPage">

        <h1>
            G-ForcePlays Admin
        </h1>

        <h2>
            Admin Login
        </h2>


        <form id="loginForm">

            <input
                type="email"
                id="loginEmail"
                placeholder="Email Address"
                required
            >


            <input
                type="password"
                id="loginPassword"
                placeholder="Password"
                required
            >


            <button type="submit">
                Login
            </button>

        </form>


        <p id="loginStatus"></p>


        <a href="index.html">
            Back to Store
        </a>

    </main>


    <!-- SUPABASE -->

    <script
        src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
    ></script>


    <!-- LOGIN SCRIPT -->

    <script
        src="login.js"
    ></script>

</body>

</html>
