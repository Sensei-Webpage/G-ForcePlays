<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Seller Dashboard - G-ForcePlays</title>


<!-- FAVICON -->

<link
    rel="icon"
    type="image/png"
    href="images/G-Force Plays.png"
>


<!-- SELLER CSS -->

<link
    rel="stylesheet"
    href="seller.css"
>
```

</head>

<body>

```
<!-- ==========================
     SELLER HEADER
=========================== -->

<header>


    <!-- TITLE -->

    <h1>
        G-ForcePlays Seller Dashboard
    </h1>


    <!-- NAVIGATION -->

    <nav>


        <!-- BACK TO STORE -->

        <a href="index.html">
            Back to Store
        </a>


        <!-- LOGOUT -->

        <button
            id="logoutBtn"
            type="button"
        >
            Logout
        </button>


    </nav>


</header>



<!-- ==========================
     SELLER DASHBOARD
=========================== -->

<main id="sellerDashboard">


    <!-- PAGE TITLE -->

    <h2>
        Customer Orders
    </h2>


    <!-- STATUS -->

    <p id="sellerStatus">
        Loading orders...
    </p>


    <!-- ==========================
         ORDER LIST
    =========================== -->

    <section id="sellerOrderList">

        <!-- Customer orders will be loaded here by seller.js -->

    </section>


</main>



<!-- ==========================
     SUPABASE
=========================== -->

<script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
></script>


<!-- ==========================
     SELLER JAVASCRIPT
=========================== -->

<script src="seller.js"></script>
```

</body>

</html>
